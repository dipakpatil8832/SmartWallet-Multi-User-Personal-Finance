<!DOCTYPE html>
<html>
<head>
    <title>Create Account | My Wallet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1cc88a, #17a673);
            font-family: "Segoe UI", Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 380px;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #17a673;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border-radius: 10px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #17a673;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .link {
            text-align: center;
            margin-top: 14px;
            font-size: 14px;
        }

        .link a {
            color: #17a673;
            text-decoration: none;
            font-weight: bold;
        }

        .logo {
            text-align: center;
            font-size: 30px;
            margin-bottom: 10px;
        }
        #toast-container {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
}

.toast {
    min-width: 260px;
    margin-bottom: 10px;
    padding: 14px 18px;
    border-radius: 12px;
    text-align: center;
    font-weight: bold;
    color: white;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    animation: slideDown 0.4s ease;
}

/* ERROR */
.toast.error {
    background: #e74c3c;
}

/* SUCCESS */
.toast.success {
    background: #2ecc71;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

    </style>
</head>

<body>

<div class="card">
 {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div id="toast-container">
      {% for category, message in messages %}
        <div class="toast {{ category }}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}


    <div class="logo">📝</div>
    <h2>Create Account</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Choose Username" required>
        <input type="password" name="password" placeholder="Choose Password" required>
        <small style="color:#555;">
  Password must be at least 6 characters
</small>

        <button type="submit">Create Account</button>
    </form>

    <div class="link">
        Already have an account?
        <a href="/login">Login</a>
    </div>
</div>
<script>
    setTimeout(() => {
        const toast = document.getElementById("toast-container");
        if (toast) {
            toast.style.display = "none";
        }
    }, 2000); // 2 seconds
</script>

</body>


</html>
