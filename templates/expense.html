<!DOCTYPE html>
<html>
<head>
    <title>Add Expense</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            background: #f1f4f9;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .card {
            max-width: 380px;
            margin: 60px auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #e5533d;
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 12px;
            text-decoration: none;
            color: #2c7be5;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>➖ Add Expense</h2>

    <form method="POST">
        <input type="number" name="amount" placeholder="Enter amount" required>
        <input type="text" name="reason" placeholder="Tea / Breakfast / Travel" required>
        <button type="submit">Save Expense</button>
    </form>

    <a href="/" class="home-btn">🏠 Home</a>

</div>

</body>
</html>
